<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOP FOOTBALL IQ</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 1.2rem;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>⚽ TOP FOOTBALL IQ ⚽</h1>

  <p>
    Wie viel Fußball steckt wirklich in dir?
  </p>

  <button onclick="startQuiz()">
    Spiel starten
  </button>
</div>

<script>

function startQuiz() {

  const container = document.querySelector(".container");

  container.innerHTML = `
    <h1>⚽ LEVEL 1 ⚽</h1>

    <h2>🟢 Anfänger</h2>

    <p>
      Kategorie:<br>
      Fußball-Grundwissen
    </p>

    <p>
      Fragen: 10
    </p>

    <p>
      Belohnung: 100 Punkte
    </p>

    <p>
      Schwierigkeit: ⭐
    </p>

    <button onclick="startLevel()">
      LEVEL STARTEN
    </button>
  `;
}

function startLevel() {

  const container = document.querySelector(".container");

  container.innerHTML = `
    <h2>Frage 1 von 10</h2>

    <p>
      Wie viele Spieler stehen pro Mannschaft bei Spielbeginn auf dem Feld?
    </p>

    <button onclick="checkAnswer(0)">A) 9</button>
    <br><br>

    <button onclick="checkAnswer(1)">B) 10</button>
    <br><br>

    <button onclick="checkAnswer(2)">C) 11</button>
    <br><br>

    <button onclick="checkAnswer(3)">D) 12</button>
  `;
}

function checkAnswer(answer) {

  if(answer === 2) {
    alert("Richtig! ⚽");
  } else {
    alert("Leider falsch!");
  }

}

</script>
