<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOP FOOTBALL IQ</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <section class="hero">

    <div class="glow"></div>

    <div class="logo">
      ⚽
    </div>

    <h1>TOP FOOTBALL IQ</h1>

    <p class="slogan">
      Wie viel Fußball steckt wirklich in dir?
    </p>

    <div class="player-card">

      <div class="stat">
        <span>⭐</span>
        <strong>Level 1</strong>
      </div>

      <div class="stat">
        <span>🏆</span>
        <strong>0 XP</strong>
      </div>

      <div class="stat">
        <span>🔥</span>
        <strong>0 Siege</strong>
      </div>

    </div>

    <button class="play-button" onclick="openWorldMap()">
      ▶ SPIELEN
    </button>

  </section>

</div>

<script src="app.js"></script>

</body>
</html>
