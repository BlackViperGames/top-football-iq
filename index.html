<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOP FOOTBALL IQ</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <section class="hero">

    <div class="hero-glow"></div>

    <div class="crest">
      <div class="crest-inner">
        <div class="ball">⚽</div>
        <div class="crest-text">TFIQ</div>
      </div>
    </div>

    <h1>TOP FOOTBALL IQ</h1>

    <p class="slogan">
      Wie viel Fußball steckt wirklich in dir?
    </p>

    <div class="profile-card">

      <div class="profile-top">

        <div>
          <span class="rank">🏆 Rookie</span>
        </div>

        <div>
          Level 1
        </div>

      </div>

      <div class="xp-label">
        XP 0 / 100
      </div>

      <div class="xp-bar">
        <div class="xp-fill"></div>
      </div>

      <div class="stats">

        <div class="stat">
          <span>⭐</span>
          <strong>0 XP</strong>
        </div>

        <div class="stat">
          <span>🔥</span>
          <strong>0 Siege</strong>
        </div>

        <div class="stat">
          <span>🏅</span>
          <strong>0 Erfolge</strong>
        </div>

      </div>

    </div>

    <button class="play-button" onclick="openWorldMap()">
      ▶ ROAD TO LEGEND
    </button>

  </section>

</div>

<script src="app.js"></script>

</body>
</html>
