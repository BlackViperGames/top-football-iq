<!DOCTYPE html>

name="viewport"

<div class="hero-features">

<h3>

</div>

<div class="feature-card">

</div>

<span class="feature-icon">

</span>

<div>

</div>

0

</div>

</div>

</div>

class="play-button"
onclick="openWorldMap()">

▶ ROAD TO LEGEND

</button>

<div class="footer-text">

Version 2.2 Alpha

</div>
